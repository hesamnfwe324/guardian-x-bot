services:
  - type: web
    name: guardian-x-ultimate
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    numInstances: 1
    autoDeploy: true

    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        fromService:
          name: guardian-x-ultimate
          type: web
          property: host
          format: https://{host}
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: WEBHOOK_PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: guardian-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: guardian-redis
          type: redis
          property: connectionString
      - key: ADMIN_KEY
        sync: false
      - key: BOT_OWNER_ID
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: ENVIRONMENT
        value: production
      - key: PYTHONPATH
        value: /app
      - key: PORT
        value: "8080"

  - type: redis
    name: guardian-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: guardian-db
    plan: starter
    databaseName: guardian_db
    user: guardian
    region: oregon
    postgresMajorVersion: "16"
