name: Trigger Render Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          echo "Attempting to trigger Render deploy via webhook..."
          # Render auto-deploys from GitHub, but if it doesn't,
          # you can use the Render API with a token:
          # curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
          #   -H "Authorization: Bearer $RENDER_API_KEY" \
          #   -H "Content-Type: application/json"
          echo "Push to main completed. Render should auto-deploy if connected."
